[variables]
HF_HOME = "/app/.cache"
SENTENCE_TRANSFORMERS_HOME = "/app/.cache"
TRANSFORMERS_CACHE = "/app/.cache"
HF_HUB_DISABLE_PROGRESS_BARS = "1"

[phases.setup]
nixPkgs = ["python311", "chromium", "chromedriver"]

[phases.install]
cmds = [
  "pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu",
  "pip install --no-cache-dir -r requirements.txt",
  "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2'); print('Model cached OK')\""
]

[start]
cmd = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
